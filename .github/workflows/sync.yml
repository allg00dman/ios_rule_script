name: Sync rule/Surge from upstream

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/blackmatrix7/ios_rule_script.git
          git fetch upstream master

      - name: Clean and sync rule/Surge only
        run: |
          # 删除除了 .github 和 rule 之外的所有内容
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name '.github' ! -name 'rule' -exec rm -rf {} +
          # 只保留 rule/Surge，删除其他
          find rule -maxdepth 1 ! -name 'rule' ! -name 'Surge' -exec rm -rf {} +
          # 从上游同步最新的 rule/Surge
          git checkout upstream/master -- rule/Surge

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "clean up and sync rule/Surge $(date +'%Y-%m-%d')"
          git push
